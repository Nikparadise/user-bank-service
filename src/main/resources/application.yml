spring:
  application:
    name: user-bank-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Секрет JWT и параметры БД хранятся в secret.properties (не коммитится в git).
  # optional: — приложение поднимется и без файла, если заданы переменные окружения.
  config:
    import: optional:classpath:secret.properties

  # Подключение к БД. Приоритет: переменные окружения DB_* -> свойства db.* из secret.properties.
  datasource:
    url: ${DB_URL:${db.url:}}
    username: ${DB_USERNAME:${db.username:}}
    password: ${DB_PASSWORD:${db.password:}}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  cache:
    type: caffeine
    cache-names:
      - users
      - userSearch

app:
  jwt:
    # Приоритет: переменная окружения JWT_SECRET -> свойство jwt.secret из secret.properties.
    # Самого значения секрета здесь нет — оно вынесено в некоммитимый файл (см. README).
    secret: ${JWT_SECRET:${jwt.secret:}}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# =====================================================================
# Профиль dev (активен по умолчанию): параметры, которые чаще всего
# меняют/тюнят — уровни логирования, вывод SQL, TTL кэша, настройки
# начисления процентов и время жизни JWT.
# =====================================================================
---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cache:
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=60s

app:
  jwt:
    # Время жизни токена, мс
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  balance:
    # +10% каждые 30 секунд, но не более 207% от первоначального депозита.
    accrual-rate: 0.10
    max-multiplier: 2.07
    scheduler-fixed-rate-ms: 30000

logging:
  level:
    home.interviewtask.userbank: DEBUG
    SqlLoggingAspect: DEBUG
    org.springframework.cache: INFO
    org.hibernate.SQL: DEBUG
